name: Fetch Telegram News

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest channel messages
        run: python3 scripts/fetch_news.py

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add news/
          if ! git diff --cached --quiet; then
            git commit -m "update news [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No news changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Purge jsDelivr cache
        if: steps.commit.outputs.changed == 'true'
        run: |
          for f in news/*.json; do
            url="https://purge.jsdelivr.net/gh/${GITHUB_REPOSITORY}@main/${f}"
            echo "Purging: $url"
            curl -s "$url" || true
          done
